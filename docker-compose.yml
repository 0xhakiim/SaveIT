services:
  minio:
    image: quay.io/minio/minio:latest
    container_name: minio

    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Web Console

    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: yourStrongPassword123

    command: server /data --console-address ":9001"

    volumes:
      - minio-data:/data

volumes:
  minio-data: